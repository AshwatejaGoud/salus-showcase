<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<title>Salus — Instagram 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  body{background:#11151f;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .frame{width:1080px;height:1080px;position:relative;overflow:hidden;color:#fff;border-radius:18px;
    background:radial-gradient(700px 500px at 75% 12%,rgba(45,212,191,.18),transparent 55%),
               radial-gradient(700px 600px at 20% 92%,rgba(185,150,74,.22),transparent 55%),
               linear-gradient(155deg,#0A2463,#061539 78%)}
  .ecg{position:absolute;top:42%;left:0;width:100%;height:200px;opacity:.32}
  .ecg path{fill:none;stroke:#D4B66E;stroke-width:3;filter:drop-shadow(0 0 8px rgba(212,182,110,.7))}
  .wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px}
  .pulse{width:34px;height:34px;border-radius:50%;background:#B9964A;box-shadow:0 0 30px 6px rgba(185,150,74,.55);margin-bottom:40px}
  .kicker{font-size:22px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:24px}
  h1{font-size:200px;font-weight:900;letter-spacing:-.04em;line-height:.9}
  h1 .us{background:linear-gradient(120deg,#D4B66E,#B9964A);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{font-size:42px;font-weight:700;margin-top:30px;color:#fff;line-height:1.2}
  .tag b{color:#D4B66E}
  .sub{font-size:24px;font-weight:500;margin-top:26px;color:rgba(255,255,255,.6);max-width:620px;line-height:1.5}
  .pills{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:44px;max-width:760px}
  .pill{font-size:19px;font-weight:600;padding:11px 20px;border-radius:30px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16)}
  .by{position:absolute;bottom:60px;left:0;right:0;text-align:center;font-size:22px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:600;z-index:2}
  .by b{color:#D4B66E}
  .hint{position:fixed;top:8px;left:8px;font-size:11px;color:#5b6473;font-family:monospace}
</style></head>
<body>
<div class="hint">Instagram · 1080×1080 — screenshot the frame</div>
<div class="frame">
  <svg class="ecg" viewBox="0 0 1080 200" preserveAspectRatio="none"><path d="M0,100 L300,100 L325,100 L342,30 L360,170 L378,100 L700,100 L725,100 L742,30 L760,170 L778,100 L1080,100"/></svg>
  <div class="wrap">
    <div class="pulse"></div>
    <div class="kicker">The Future of Healthcare</div>
    <h1>SAL<span class="us">US</span></h1>
    <div class="tag">Healthcare.<br/><b>Reimagined</b> for Everyone.</div>
    <div class="sub">Find &amp; book verified clinics in seconds. Built for cities <i>and</i> villages.</div>
    <div class="pills">
      <span class="pill">🩸 Lab tests</span><span class="pill">🚨 SOS</span><span class="pill">💊 Pharmacy</span>
      <span class="pill">🎙️ Symptom AI</span><span class="pill">🤝 Second opinion</span>
    </div>
  </div>
  <div class="by">by SATG · <b>Global Health Technology</b></div>
</div>
</body></html>
